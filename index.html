<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="記帳">
<title>記帳 · Finance Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f7f6f3;--surface:#ffffff;--surface2:#f0ede8;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1a1a1a;--text2:#666;--text3:#999;--green:#1a9e6e;--green-bg:#e8f7f1;--red:#d94f3a;--red-bg:#fcecea;--blue:#2e6fda;--blue-bg:#e8f0fc;--accent:#1a1a1a;--radius:14px;--radius-sm:9px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--nav-h:68px;--safe-bottom:env(safe-area-inset-bottom,0px);}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--surface:#1c1c1a;--surface2:#252523;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0efe9;--text2:#999;--text3:#666;--green:#22c07a;--green-bg:#0d2e20;--red:#e8604a;--red-bg:#2d1610;--blue:#4a8aed;--blue-bg:#0d1f3c;--accent:#f0efe9;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;}
.header{padding:16px 20px 12px;padding-top:calc(16px + env(safe-area-inset-top,0px));background:var(--bg);display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.header-title{font-size:17px;font-weight:500;letter-spacing:-0.3px;}
.header-sub{font-size:12px;color:var(--text3);font-family:var(--mono);}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);}
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--surface);border-top:0.5px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--font);font-weight:500;letter-spacing:.03em;transition:color .15s;}
.nav-btn.on{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}
.pane{display:none;}.pane.on{display:block;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.kpi{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border:0.5px solid var(--border);}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
.kpi-val{font-size:20px;font-weight:500;font-family:var(--mono);letter-spacing:-.5px;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.g{color:var(--green);}.r{color:var(--red);}.b{color:var(--blue);}
.sec{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:14px;overflow:hidden;}
.sec-head{padding:14px 16px 0;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:500;}
.sec-body{padding:12px 16px 14px;}
.chart-wrap{position:relative;width:100%;}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 16px 12px;font-size:11px;color:var(--text2);}
.ld{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
.tx-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border);}
.tx-row:last-child{border-bottom:none;}
.tx-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.tx-amt{font-size:15px;font-weight:500;font-family:var(--mono);flex-shrink:0;}
.tx-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;flex-shrink:0;}
.form-card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px;margin-bottom:14px;}
.type-tog{display:grid;grid-template-columns:1fr 1fr;border:0.5px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px;}
.ttbtn{padding:10px;font-size:14px;font-weight:500;cursor:pointer;background:none;border:none;font-family:var(--font);color:var(--text2);transition:all .15s;}
.ttbtn.on.exp{background:var(--red);color:#fff;}
.ttbtn.on.inc{background:var(--green);color:#fff;}
.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.field input,.field select{width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:15px;font-family:var(--font);-webkit-appearance:none;appearance:none;outline:none;}
.field input:focus,.field select:focus{border-color:var(--blue);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.submit-btn{width:100%;padding:14px;font-size:16px;font-weight:500;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);color:#fff;transition:opacity .15s;margin-top:4px;}
.submit-btn:active{opacity:.8;}
.msg{text-align:center;font-size:13px;margin-top:10px;min-height:20px;}
.filter-row{display:flex;gap:8px;margin-bottom:12px;}
.filter-row select{flex:1;padding:9px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--font);-webkit-appearance:none;outline:none;}
.filter-count{font-size:12px;color:var(--text3);align-self:center;flex-shrink:0;}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:32px 0;}
.cat-bar{margin-bottom:10px;}
.cat-bar-top{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px;}
.cat-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;}
.month-sel-wrap{margin-bottom:14px;}
.month-sel-wrap select{width:100%;padding:10px 13px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;font-family:var(--mono);-webkit-appearance:none;outline:none;}
.import-btn{width:100%;padding:12px;font-size:14px;border:0.5px dashed var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text2);font-family:var(--font);cursor:pointer;margin-top:8px;}
.export-btn{width:100%;padding:13px;font-size:14px;font-weight:500;border:none;border-radius:var(--radius-sm);background:var(--blue);color:#fff;font-family:var(--font);cursor:pointer;margin-top:8px;transition:opacity .15s;}
.export-btn:active{opacity:.8;}
.export-section{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:16px;margin-bottom:14px;}
.export-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.export-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.estat{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center;}
.estat-val{font-size:16px;font-weight:500;font-family:var(--mono);}
.estat-label{font-size:10px;color:var(--text3);margin-top:2px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">記帳</div>
    <div class="header-sub" id="hdr-sub"></div>
  </div>
  <div class="content" id="content">

    <!-- ENTRY -->
    <div class="pane on" id="pane-entry">
      <div class="form-card">
        <div class="type-tog">
          <button class="ttbtn exp on" id="btn-exp" onclick="setType('Expense')">支出</button>
          <button class="ttbtn inc" id="btn-inc" onclick="setType('Income')">收入</button>
        </div>
        <div class="field-row">
          <div class="field"><label>日期</label><input type="date" id="f-date"></div>
          <div class="field"><label>金額 (HKD)</label><input type="number" id="f-amt" placeholder="0" min="0" step="0.01" inputmode="decimal"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>主分類</label><select id="f-main" onchange="updateSub()"></select></div>
          <div class="field"><label>子分類</label><select id="f-sub"></select></div>
        </div>
        <div class="field"><label>備註（可選）</label><input type="text" id="f-note" placeholder="例：午飯、交通費..."></div>
        <button class="submit-btn" id="submit-btn" onclick="addEntry()">新增記錄</button>
        <div class="msg" id="form-msg"></div>
      </div>
      <div class="sec">
        <div class="sec-head" style="padding-bottom:12px;">最近記錄</div>
        <div style="padding:0 16px 14px;" id="recent-list"></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="pane" id="pane-dash">
      <div class="month-sel-wrap"><select id="dash-month" onchange="renderDash()"></select></div>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="sec">
        <div class="sec-head">近 6 個月走勢</div>
        <div class="legend"><span><span class="ld" style="background:#1a9e6e"></span>收入</span><span><span class="ld" style="background:#d94f3a"></span>支出</span></div>
        <div style="padding:0 12px 14px;"><div class="chart-wrap" style="height:190px;"><canvas id="c-trend" role="img" aria-label="近6個月收支走勢"></canvas></div></div>
      </div>
      <div class="sec">
        <div class="sec-head">累計儲蓄走勢（2022–）</div>
        <div style="padding:12px 12px 14px;"><div class="chart-wrap" style="height:150px;"><canvas id="c-cum" role="img" aria-label="累計儲蓄走勢"></canvas></div></div>
      </div>
      <div class="sec">
        <div class="sec-head">本月支出分類</div>
        <div class="sec-body" id="cat-bars"></div>
      </div>
      <div class="sec">
        <div class="sec-head">本月支出明細</div>
        <div style="padding:0 16px 14px;" id="dash-detail"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="pane" id="pane-history">
      <div class="filter-row">
        <select id="h-type" onchange="renderHistory()"><option value="all">全部</option><option value="Expense">支出</option><option value="Income">收入</option></select>
        <select id="h-month" onchange="renderHistory()"></select>
        <div class="filter-count" id="h-count"></div>
      </div>
      <div class="sec"><div style="padding:0 16px 14px;" id="history-list"></div></div>
    </div>

  </div>
    <!-- EXPORT -->
    <div class="pane" id="pane-export">
      <div class="export-section">
        <div class="export-label">資料概覽</div>
        <div class="export-stats" id="exp-stats"></div>
        <button class="export-btn" onclick="exportCSV()">匯出 CSV 檔案</button>
        <div class="msg" id="exp-msg"></div>
      </div>
      <div class="sec">
        <div class="sec-head" style="padding-bottom:10px;">關於匯出</div>
        <div style="padding:8px 16px 16px;font-size:13px;color:var(--text2);line-height:1.7;">
          匯出嘅 CSV 包含所有記錄（歷史 + 新增），格式同原本 smoney.csv 一致，可直接用 Excel 或 Numbers 開啟。
        </div>
      </div>
    </div>

  <nav class="nav">
    <button class="nav-btn on" onclick="goNav('entry',this)"><span class="nav-icon">＋</span><span>記帳</span></button>
    <button class="nav-btn" onclick="goNav('dash',this)"><span class="nav-icon">◎</span><span>總覽</span></button>
    <button class="nav-btn" onclick="goNav('history',this)"><span class="nav-icon">≡</span><span>記錄</span></button>
    <button class="nav-btn" onclick="goNav('export',this)"><span class="nav-icon">↓</span><span>匯出</span></button>
  </nav>
</div>

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById("pane-"+id).classList.add("on");
  btn.classList.add("on");
  document.getElementById("content").scrollTop=0;
  if(id==="dash")renderDash();
  if(id==="history")renderHistory();
  if(id==="entry")renderRecent();
  if(id==="export")renderExport();
}
function setType(t){
  currentType=t;
  document.getElementById("btn-exp").classList.toggle("on",t==="Expense");
  document.getElementById("btn-inc").classList.toggle("on",t==="Income");
  document.getElementById("submit-btn").style.background=t==="Expense"?"var(--red)":"var(--green)";
  buildCatDrops();
}
function buildCatDrops(){
  const mains=Object.keys(CATS[currentType]);
  document.getElementById("f-main").innerHTML=mains.map(m=>`<option>${m}</option>`).join("");
  updateSub();
}
function updateSub(){
  const m=document.getElementById("f-main").value;
  const subs=CATS[currentType][m]||["其他"];
  document.getElementById("f-sub").innerHTML=subs.map(s=>`<option>${s}</option>`).join("");
}
function addEntry(){
  const date=document.getElementById("f-date").value;
  const amt=parseFloat(document.getElementById("f-amt").value);
  const main=document.getElementById("f-main").value;
  const sub=document.getElementById("f-sub").value;
  const note=document.getElementById("f-note").value.trim();
  const msg=document.getElementById("form-msg");
  if(!date||isNaN(amt)||amt<=0){msg.textContent="請填寫日期同金額";msg.style.color="var(--red)";return;}
  entries.push({id:nextId++,date,type:currentType,main,sub,amt,note});
  save();
  document.getElementById("f-amt").value="";
  document.getElementById("f-note").value="";
  msg.textContent="✓ 已新增";msg.style.color="var(--green)";
  setTimeout(()=>msg.textContent="",2000);
  renderRecent();
}
function delEntry(id){entries=entries.filter(e=>e.id!==id);save();renderRecent();renderHistory();}
function txRow(e,showDel){
  const icon=ICONS[e.main]||"📦";
  const ibg=e.type==="Income"?"var(--green-bg)":"var(--red-bg)";
  const ac=e.type==="Income"?"var(--green)":"var(--red)";
  const sign=e.type==="Income"?"+":"-";
  return`<div class="tx-row"><div class="tx-icon" style="background:${ibg};">${icon}</div><div class="tx-info"><div class="tx-name">${e.note||e.sub}</div><div class="tx-sub">${e.date.slice(5)} · ${e.main}</div></div><div class="tx-amt" style="color:${ac};">${sign}${fmt(e.amt)}</div>${showDel?`<button class="tx-del" onclick="delEntry(${e.id})">×</button>`:""}</div>`;
}
function renderRecent(){
  const list=[...entries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  document.getElementById("recent-list").innerHTML=list.length?list.map(e=>txRow(e,true)).join(""):"<div class='empty'>暫無記錄</div>";
}
function getMonths(){
  const set=new Set(entries.map(e=>e.date.slice(0,7)));
  const now=new Date().toISOString().slice(0,7);set.add(now);
  return[...set].sort().reverse();
}
function buildMonthSels(){
  const months=getMonths();
  ["dash-month","h-month"].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const cur=el.value;
    el.innerHTML=months.map(m=>`<option value="${m}">${m}</option>`).join("");
    if(cur&&months.includes(cur))el.value=cur;
  });
}
function renderDash(){
  buildMonthSels();
  const sel=document.getElementById("dash-month").value||getMonths()[0];
  const me=entries.filter(e=>e.date.startsWith(sel));
  const inc=me.filter(e=>e.type==="Income").reduce((s,e)=>s+e.amt,0);
  const exp=me.filter(e=>e.type==="Expense").reduce((s,e)=>s+e.amt,0);
  const net=inc-exp;
  const sr=inc>0?Math.round((net/inc)*100):0;
  document.getElementById("kpi-grid").innerHTML=`<div class="kpi"><div class="kpi-label">收入</div><div class="kpi-val g">${fmt(inc)}</div></div><div class="kpi"><div class="kpi-label">支出</div><div class="kpi-val r">${fmt(exp)}</div></div><div class="kpi"><div class="kpi-label">淨儲蓄</div><div class="kpi-val ${net>=0?"b":"r"}">${net>=0?"":"-"}${fmt(net)}</div></div><div class="kpi"><div class="kpi-label">儲蓄率</div><div class="kpi-val ${sr>=0?"b":"r"}">${sr}%</div></div>`;
  const am=getMonths().slice(0,6).reverse();
  const iD=am.map(m=>entries.filter(e=>e.date.startsWith(m)&&e.type==="Income").reduce((s,e)=>s+e.amt,0));
  const eD=am.map(m=>entries.filter(e=>e.date.startsWith(m)&&e.type==="Expense").reduce((s,e)=>s+e.amt,0));
  if(trendChart){trendChart.destroy();trendChart=null;}
  trendChart=new Chart(document.getElementById("c-trend"),{type:"bar",data:{labels:am.map(m=>m.slice(2)),datasets:[{label:"收入",data:iD,backgroundColor:"#1a9e6e",borderRadius:5},{label:"支出",data:eD,backgroundColor:"#d94f3a",borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:"#888"},grid:{display:false}},y:{ticks:{font:{size:9},color:"#888",callback:v=>"$"+(v/1000).toFixed(0)+"K"},grid:{color:"rgba(128,128,128,0.08)"}}}}});
  const allM=getMonths().reverse();
  let cum=0;
  const cumD=allM.map(m=>{const i=entries.filter(e=>e.date.startsWith(m)&&e.type==="Income").reduce((s,e)=>s+e.amt,0);const x=entries.filter(e=>e.date.startsWith(m)&&e.type==="Expense").reduce((s,e)=>s+e.amt,0);cum+=(i-x);return Math.round(cum);});
  if(cumChart){cumChart.destroy();cumChart=null;}
  cumChart=new Chart(document.getElementById("c-cum"),{type:"line",data:{labels:allM.map(m=>m.slice(2)),datasets:[{data:cumD,borderColor:"#2e6fda",backgroundColor:"rgba(46,111,218,0.08)",borderWidth:2,pointRadius:0,fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},color:"#888",maxTicksLimit:10},grid:{display:false}},y:{ticks:{font:{size:9},color:"#888",callback:v=>"$"+(v/1000).toFixed(0)+"K"},grid:{color:"rgba(128,128,128,0.08)"}}}}});
  const ebm={};
  me.filter(e=>e.type==="Expense").forEach(e=>{ebm[e.main]=(ebm[e.main]||0)+e.amt;});
  const ck=Object.keys(ebm).sort((a,b)=>ebm[b]-ebm[a]);
  const maxA=ck.length?ebm[ck[0]]:1;
  document.getElementById("cat-bars").innerHTML=ck.length?ck.map((k,i)=>`<div class="cat-bar"><div class="cat-bar-top"><span>${ICONS[k]||"📦"} ${k}</span><span style="font-family:var(--mono)">${fmt(ebm[k])}</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.round((ebm[k]/maxA)*100)}%;background:${COLORS[i%COLORS.length]};"></div></div></div>`).join(""):"<div class='empty'>本月沒有支出</div>";
  const sd=me.filter(e=>e.type==="Expense").sort((a,b)=>b.amt-a.amt).slice(0,12);
  document.getElementById("dash-detail").innerHTML=sd.length?sd.map(e=>txRow(e,false)).join(""):"<div class='empty'>本月沒有支出記錄</div>";
  document.getElementById("hdr-sub").textContent=sel+" · "+entries.length.toLocaleString()+"筆";
}
function renderHistory(){
  buildMonthSels();
  const ft=document.getElementById("h-type").value;
  const fm=document.getElementById("h-month").value;
  let list=entries.filter(e=>e.date.startsWith(fm));
  if(ft!=="all")list=list.filter(e=>e.type===ft);
  list.sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById("h-count").textContent=list.length+"筆";
  document.getElementById("history-list").innerHTML=list.length?list.map(e=>txRow(e,true)).join(""):"<div class='empty'>沒有記錄</div>";
}
function renderExport(){
  const total=entries.length;
  const exp=entries.filter(e=>e.type==="Expense");
  const inc=entries.filter(e=>e.type==="Income");
  const totalExp=exp.reduce((s,e)=>s+e.amt,0);
  const totalInc=inc.reduce((s,e)=>s+e.amt,0);
  document.getElementById("exp-stats").innerHTML=`
    <div class="estat"><div class="estat-val">${total.toLocaleString()}</div><div class="estat-label">總記錄</div></div>
    <div class="estat"><div class="estat-val g">$${Math.round(totalInc/1000)}K</div><div class="estat-label">總收入</div></div>
    <div class="estat"><div class="estat-val r">$${Math.round(totalExp/1000)}K</div><div class="estat-label">總支出</div></div>`;
}
function exportCSV(){
  const msg=document.getElementById("exp-msg");
  try{
    const rows=[["記帳日期","分類","主分類","子分類","Amount","更新日期","備註"]];
    const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
    sorted.forEach(e=>{
      const note=(e.note||"").replace(/,/g,"，");
      rows.push([e.date,e.type,e.main,e.sub,e.amt.toFixed(3),e.date,note]);
    });
    const csv=rows.map(r=>r.join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    const today=new Date().toISOString().slice(0,10);
    a.download="smoney_"+today+".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    msg.textContent="✓ 已匯出 "+entries.length.toLocaleString()+" 筆記錄";
    msg.style.color="var(--green)";
    setTimeout(()=>msg.textContent="",3000);
  }catch(err){
    msg.textContent="匯出失敗，請重試";
    msg.style.color="var(--red)";
  }
}
function init(){
  load();
  document.getElementById("f-date").value=new Date().toISOString().slice(0,10);
  document.getElementById("hdr-sub").textContent=entries.length.toLocaleString()+" 筆記錄";
  setType("Expense");
  buildMonthSels();
  renderRecent();
}
init();
</script>
</body>
</html>
